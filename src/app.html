<!doctype html>
<html lang="en" class="dark" data-accent="gold">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0b0a09" />
		<script>
			// Apply the saved accent palette before paint to avoid a flash.
			try {
				var a = localStorage.getItem('accent');
				if (a) document.documentElement.dataset.accent = a;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-ink-900">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
